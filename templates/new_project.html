<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>New Project</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="/static/themes.css">
    <style>
        .modal-backdrop {
            position: fixed;
            top: 0; left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 999;
        }

        .modal-box {
            background-color: var(--th-card);
            padding: 30px;
            border-radius: 10px;
            width: 400px;
            box-shadow: 0 0 20px var(--th-glow);
            color: var(--th-text);
        }

        .modal-box h2 {
            margin-top: 0;
            color: var(--th-warm);
            text-align: center;
        }

        .modal-box label {
            display: block;
            margin-top: 15px;
            margin-bottom: 5px;
            color: var(--th-accent2);
            font-weight: bold;
        }

        .modal-box input,
        .modal-box select {
            width: 100%;
            padding: 8px;
            border-radius: 5px;
            border: 1px solid var(--th-border);
            background-color: var(--th-bg2);
            color: var(--th-text);
            font-family: 'Fira Code', monospace;
        }

        .modal-box button {
            margin-top: 20px;
            width: 100%;
        }

        .modal-box a {
            display: block;
            margin-top: 15px;
            text-align: center;
            color: var(--th-warm);
        }
    </style>
</head>
<body class="theme-{{ theme | default('default') }} page-{{ page_id | default('new_project') }}" data-theme="{{ theme | default('default') }}" data-page="{{ page_id | default('new_project') }}">
    <div class="modal-backdrop">
        <div class="modal-box">
            <h2>New Project</h2>
            <form method="POST" action="/project/new">
                <label for="name">Project Name:</label>
                <input type="text" name="name" id="name" required>

                <label for="mode">Mode:</label>
                <select name="mode" id="mode">
                    <option value="domain">Domain</option>
                    <option value="url">URL</option>
                </select>

                <label for="target">Target:</label>
                <input type="text" name="target" id="target" required>

                <label for="start_now">Start Now?</label>
                <select name="start_now" id="start_now">
                    <option value="yes">Yes, start now</option>
                    <option value="no">No, start later</option>
                </select>

                <button type="submit">Create Project</button>
            </form>
            <a href="/dashboard">← Back to Dashboard</a>
        </div>
    </div>
</body>
</html>
